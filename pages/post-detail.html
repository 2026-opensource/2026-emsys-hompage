<!--게시글 상세 페이지-->
<!doctype html>
<html lang="ko">
  <head>
    <title>게시글 상세</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/board.css" />
    <link rel="stylesheet" href="../css/post-detail.css" />
  </head>

  <body>
    <!-- =========================
       상세 페이지
  ========================== -->

    <main class="board-page">
      <div class="detail-container">
        <!-- 상단 영역 -->
        <div class="detail-top-area">
          <!-- 목록으로 -->
          <a href="./community.html" class="back-link"> &lt; 목록으로 </a>

          <!-- 버튼 -->
          <div class="detail-top-buttons">
            <button class="edit-btn">게시글 수정</button>

            <button class="delete-btn">게시글 삭제</button>
          </div>
        </div>

        <!-- 제목 영역 -->
        <section class="detail-header">
          <!-- 초록 선 -->
          <div class="title-line"></div>

          <div class="detail-title-area">
            <!-- 카테고리 -->
            <div class="board-category">자유</div>

            <!-- 제목/정보 -->
            <div class="detail-title-content">
              <h1 class="detail-title">게시글 제목</h1>

              <p class="detail-info">작성일 2026.05.10 · 조회수 6</p>
            </div>
          </div>
        </section>

        <!-- 게시글 내용 -->
        <section class="detail-content">
          <p>작성된 게시글 내용은 이렇게 보이게 될 것</p>

          <p>이렇게~</p>
        </section>

        <!-- 좋아요 영역 -->
        <section class="reaction-section">
          <button class="like-btn reaction-btn">👍 좋아요(4)</button>

          <button class="dislike-btn reaction-btn">👎 싫어요(2)</button>
        </section>

        <!-- 댓글 영역 -->
        <section class="comment-section">
          <!-- 댓글 제목 -->
          <h2 class="comment-title">댓글(n)</h2>

          <!-- 댓글 카드 -->
          <div class="comment-card">
            <div class="comment-main">
              <h3 class="comment-writer">24000</h3>

              <p class="comment-text">
                사용자 댓글 작성 내용은 이와 같이 보이게 될 것임~
              </p>
            </div>

            <!-- 수정 삭제 -->
            <div class="comment-actions">
              <button>수정</button>

              <button>삭제</button>
            </div>
          </div>
        </section>

        <!-- 댓글 입력 -->
        <section class="comment-input-section">
          <input
            type="text"
            class="comment-input"
            placeholder="댓글을 입력하세요..."
          />

          <button class="comment-submit-btn">➤</button>
        </section>
      </div>
    </main>

    <!-- JS -->
    <script src="../js/board.js"></script>
  </body>
</html>
