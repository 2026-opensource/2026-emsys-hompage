<!--아이디/비밀번호 찾기 페이지-->

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <!-- 공통 라이브러리 -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/auth.css">

    <link rel="stylesheet" href="../css/common.css" type="text/css">
    <title>EMSYS Find Account</title>
</head>

<body>
    <div id="header"></div>
    <section class="auth-box">
        <div class="auth-container">
            <ul class="nav nav-tabs find-tabs">
                <li class="active">
                    <a data-toggle="tab" href="#find-id">아이디 찾기</a> <!--아래 find-id로 연결됨-->
                </li>
                <li>
                    <a data-toggle="tab" href="#find-pw">비밀번호 변경</a>
                </li>
            </ul>

            <div class="tab-content find-content">
                <div id="find-id" class="tab-pane fade in active">
                    <form class="find-form">
                        <input class="input-box" type="text" name="name" placeholder="이름" required><br>
                        <input class="input-box" type="text" name="student-id" placeholder="학번" required><br>
                        <button class="auth-btn" type="submit">아이디 찾기</button><br>
                        <p class="login-link"><a href="login.html">로그인 페이지로 이동</a></p>
                    </form>
                </div>

                <div id="find-pw" class="tab-pane fade">
                    <h2>사용자 정보 확인</h2>
                    <form class="find-form" action="change-password.html"> <!-- 사용자 정보 확인 후 change-password.html로 이동 -->
                        <input class="input-box" type="text" name="name" placeholder="이름" required><br>
                        <input class="input-box" type="text" name="student-id" placeholder="학번" required><br>
                        <input class="input-box" type="email" name="email" placeholder="아이디(이메일)" autocomplete="email"
                            required><br>
                        <button class="auth-btn" type="submit">비밀번호 변경하러 가기</button>
                    </form>
                    <p class="login-link"><a href="login.html">로그인 페이지로 이동</a></p>
                </div>
            </div>
        </div>
    </section>
    <div id="footer"></div>
    <script src="../js/common.js"></script>
</body>

</html>
