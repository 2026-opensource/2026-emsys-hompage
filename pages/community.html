<!--커뮤니티 페이지-->
<!doctype html>
<html>
  <head>
    <title>커뮤니티</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap 3 사용-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Pretendard 폰트-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/board.css" />
  </head>

  <body>
    <div id="header"></div>
    <!-- 메인 -->
    <main class="board-page">
      <div class="board-container">
        <!-- 제목 -->
        <div class="board-title-area">
          <h1 class="board-page-title">커뮤니티</h1>
          <div class="title-line"></div>
        </div>

        <!-- 메뉴 영역부터 본문 영역까지 -->
        <div class="board-main-area">
          <!-- 글쓰기 버튼 -->
          <a href="./post-write.html">
              <button type="button" class="write-btn">글쓰기</button>
          </a>

          <!-- 검색 영역-->
          <div class="board-search-area">
            <select class="form-control board-category-select">
              <option>카테고리</option>
              <option>자유</option>
              <option>질문</option>
              <option>공지</option>
            </select>

            <div class="input-group board-search-input">
              <input
                type="text"
                class="form-control search-input"
                placeholder="검색"
              />

              <span class="input-group-btn">
                <button class="btn btn-default search-btn" type="button">
                  <span class="glyphicon glyphicon-search"></span>
                </button>
              </span>
            </div>
          </div>

          <!-- 게시글 목록 -->
          <section class="board-list">
            <a href="./post-detail.html" class="board-link">
              <article class="board-card">
                <!-- 카테고리 -->
                <div class="board-category">자유</div>

                <!-- 본문 -->
                <div class="board-main">
                  <h2 class="board-title">
                    첫 번째 게시글 제목입니다. 테스트를 위해 제목을 길게
                    적어보고 있습니다. 이쯤되면 두 줄은 넘겠죠?
                  </h2>
                  <p class="board-info">홍길동 · 2026-05-10</p>
                </div>

                <!-- 통계 -->
                <div class="board-stats">
                  <p>조회수 12</p>
                  <p>좋아요 7</p>
                  <p>댓글 3</p>
                </div>
              </article>
            </a>
            <a href="./post-detail.html" class="board-link">
              <article class="board-card">
                <!-- 카테고리 -->
                <div class="board-category">자유</div>

                <!-- 본문 -->
                <div class="board-main">
                  <h2 class="board-title">
                    두 번째 게시글 제목입니다. 테스트를 위해 제목을 길게
                    적어보고 있습니다. 이쯤되면 두 줄은 넘겠죠?
                  </h2>
                  <p class="board-info">홍길동 · 2026-05-10</p>
                </div>

                <!-- 통계 -->
                <div class="board-stats">
                  <p>조회수 12</p>
                  <p>좋아요 7</p>
                  <p>댓글 3</p>
                </div>
              </article>
            </a>
          </section>
        </div>
      </div>
    </main>
    <div id="footer"></div>

    <!-- JS -->
    <script src="../js/board.js"></script>
    <script src="../js/common.js"></script>
  </body>
</html>
