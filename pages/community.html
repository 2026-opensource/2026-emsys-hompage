<!--커뮤니티 목록 페이지-->
<!doctype html>
<html lang="ko">
  <head>
    <title>커뮤니티</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/board.css" />
  </head>

  <body>
    <!-- 헤더 -->
    <nav class="custom-navbar">
      <div class="nav-container">
        <!-- 로고 -->
        <a href="../index.html">
          <img
            src="../assets/images/logo-green.png"
            alt="EMSYS"
            class="logo-image"
          />
        </a>

        <!-- 내비게이션 바 -->
        <ul class="nav-menu">
          <li>
            <a href="../index.html"> EMSYS 소개 </a>
          </li>

          <li>
            <a href="./community.html"> 커뮤니티 </a>
          </li>

          <li>
            <a href="./mypage.html"> 마이페이지 </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- 메인 -->
    <main class="board-page">
      <div class="board-container">
        <!-- 페이지 제목 -->
        <div class="board-title-area">
          <h1 class="board-page-title">커뮤니티</h1>
          <div class="title-line"></div>
        </div>

        <!-- 상단 영역 -->
        <div class="board-top">
          <!-- 글쓰기 버튼 -->
          <button class="write-btn">글쓰기</button>

          <!-- 검색 -->
          <div class="board-search-area">
            <!-- 카테고리 -->
            <select class="category-select">
              <option>카테고리</option>
              <option>자유</option>
              <option>질문</option>
              <option>공지</option>
            </select>

            <!-- 검색창 -->
            <input type="text" class="search-input" placeholder="검색" />
          </div>
        </div>

        <!-- 게시글 목록 -->
        <section class="board-list">
          <a href="./post-detail.html" class="board-link">
            <article class="board-card">
              <div class="board-category">자유</div>

              <div class="board-main">
                <h2 class="board-title">첫 번째 게시글 제목입니다</h2>

                <p class="board-content">게시글 내용이 들어가는 영역입니다.</p>

                <p class="board-info">홍길동 · 2026-05-10</p>
              </div>

              <div class="board-stats">
                <p>조회수 12</p>
                <p>좋아요 7</p>
                <p>댓글 3</p>
              </div>
            </article>
          </a>
        </section>
      </div>
    </main>

    <!-- JS -->
    <script src="../js/board.js"></script>
  </body>
</html>
