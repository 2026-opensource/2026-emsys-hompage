<!--로그인 페이지-->

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/auth.css">
    <title>EMSYS Login</title>
</head>

<body>
    <section class="login-box">
        <div class="auth-content">
            <h1 class="auth-text">LOGIN</h1>
            <p class="auth-subtext">로그인하세요</p>
            <form class="auth-form">
                <input class="input-box" type="text" placeholder="아이디" required><br>
                <input class="input-box" type="password" placeholder="비밀번호" required><br>
                <button class="auth-btn btn btn-default" type="submit">로그인</button>
            </form>
            <p class="signup-link">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
            <p class="find-link">계정을 잃어버리셨나요? <a href="find-account.html">ID/PW 찾기</a></p>
        </div>
    </section>
</body>

</html>
