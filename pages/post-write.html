<!--글 작성 페이지-->

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <!-- bootstrap, jquery -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <!-- font awesome glyphicon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- summernote-lite css 추가 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/summernote/0.8.18/summernote-bs4-dark.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/summernote/summernote-lite.css">
    <link rel="stylesheet" href="../css/post-write.css">
    <link rel="stylesheet" href="../css/common.css">
    <title>EMSYS Post Write</title>
</head>

<body>
    <section class="post-write-box">
        <div class="container">
            <div class="board-header">
                <h3 class="write-board-title">게시글 작성</h3>
                <div class="board-button">
                    <button class="cancel-write-btn btn btn-default" type="cancel">목록으로</button> 
                    <button class="post-write-btn btn btn-default" type="submit">등록</button>
                </div>
            </div>
            
            <hr class="header-divider">
            
            <div class="form-group">
                <form class="title-box">
                    <select class="category-select" required>
                        <option value="" disabled selected hidden>게시판 선택</option>
                        <option value="general">전체 글</option>
                        <option value="general">자유제시판</option>
                        <option value="notice">공지사항</option>
                        <option value="contest">대회/공모전</option>
                    </select>
                
                    <input class="title-input-box form-control" type="text" placeholder="제목을 입력해주세요." required><br>
                </form>

                <form class="content-box">
                    <textarea class="content-input-box form-control post-content" id="summernote" placeholder="내용을 입력하세요." required></textarea>
                </form>

            </div>
        </div>

    <!-- Summernote lite 버전 사용 -->
    <script src="../assets/summernote/summernote-lite.js"></script>
    <script src="../assets/summernote/summernote-ko-KR.js"></script>

    <script>
        $(document).ready(function () { // HTML 문서가 완전히 로드된 후에 실행
            $('#summernote').summernote({ // Summernote 에디터 초기화
                height: 320,
                minHeight:300,
                maxHeight: 380,
                lang: 'ko-KR',
                theme: 'bs4-dark',
                placeholder: '내용을 입력하세요.',
                toolbar: [
                    ['style', ['style']],
                    ['fontsize', ['fontsize']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['insert', ['link', 'picture']],
                    ['view', ['fullscreen']]
                ],
                fontSizes: ['10', '14', '18', '24', '36', '48', '64']
            });
        });
    </script>

</body>

</html>
