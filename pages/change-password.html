<!--마이 페이지-->
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <!-- 사용자 관련 페이지 공통 라이브러리 -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="css/common.css" type="text/css">
    <title>EMSYS Change Password</title>
</head>

<body>
    <div id="header"></div>
    <section class="change-pw-box">
        <div class="auth-container">
            <h1 class="change-pw-text">비밀번호 변경</h1>
            <p class="change-pw-subtext">비밀번호를 변경하세요</p>
            <form class="change-pw-form">
                <input class="input-box" type="password" name="new-password" placeholder="새 비밀번호" required><br>
                <input class="input-box" type="password" name="confirm-new-password" placeholder="새 비밀번호 확인" required><br>
                <button class="auth-btn" type="submit">비밀번호 변경</button>
            </form>
            <p class="login-link"><a href="login.html">로그인 페이지로 이동</a></p>
        </div>
    </section>
    <div id="footer"></div>
    <script src="../js/common.js"></script>
</body>
</html>
