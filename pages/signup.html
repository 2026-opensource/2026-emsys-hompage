<!--회원가입 페이지-->

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/auth.css">
    <title>EMSYS Sign Up</title>
</head>

<body>
    <section class="signup-box">
        <div class="auth-container">
            <h1 class="signup-text">SIGN UP</h1>
            <p class="signup-subtext">EMSYS에 오신걸 환영합니다!</p>
            <form class="signup-form">
                <input class="input-box" type="text" name="email" placeholder="아이디(이메일)" required><br>
                <input class="input-box" type="text" name="name" placeholder="이름" required><br>
                <input class="input-box" type="text" name="student-id" placeholder="학번" required><br>
                <input class="input-box" type="password" name="password" placeholder="비밀번호" required><br>
                <input class="input-box" type="password" name="confirm-password" placeholder="비밀번호 확인" required><br>
                <input class="input-box" type="text" name="invite-code" placeholder="초대코드" required><br>
                <button class="signup-btn btn btn-default" type="submit">회원가입</button>
            </form>
            <p class="login-link">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
        </div>
    </section>
</body>

</html>
